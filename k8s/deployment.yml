apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-deploy
  labels:
    app: bookstore
spec:
  replicas: 3

  selector:
    matchLabels:
      app: bookstore

  template:
    metadata:
      labels:
        app: bookstore

    spec:
      containers:
      - name: bookstore-container
        image: venkyveera/javabook:latest
        ports:
        - containerPort: 8080
